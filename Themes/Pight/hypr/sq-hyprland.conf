decoration { 
    rounding = 1
}

general {
    border_size=3
    col.active_border=0xffca81ea # ARGB in hex
    col.inactive_border=0x393552ff
}

 animations {
     enabled = yes
     bezier = wind, 0.05, 0.9, 0.1, 1.05
     bezier = winIn, 0.1, 1, 0.1, 1
     bezier = winOut, 0.3, -0.3, 0, 1
     bezier = liner, 1, 1, 1, 1
     animation = windows, 1, 6, wind, slidevert
     animation = windowsIn, 1, 6, winIn, slidevert
     animation = windowsOut, 1, 5, winOut, slidevert
     animation = windowsMove, 1, 5, wind, slidevert
     animation = border, 1, 1, liner
     animation = borderangle, 1, 30, liner, once
     animation = fade, 1, 10, default
     animation = workspaces, 1, 5, wind
}
