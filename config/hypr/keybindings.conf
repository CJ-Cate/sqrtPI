# SqrtPI Keybinds v0

# modifier key
$mainMod = Super # this is the windows key, icon key, etc.

$TERMINAL = kitty
#$EDITOR = code #not implemented yet
$EXPLORER = dolphin
$BROWSER = librewolf

$l=Launcher
$d=[$l|Apps]
bindd = $mainMod, T, $d terminal emulator , exec, $TERMINAL
#bindd = $mainMod, E, $d file explorer , exec, $EXPLORER
bindd = $mainMod, B, $d web browser , exec, $BROWSER

# Exit hyprla
#bind = $mainMod Shift, M, exit,

# Screenshot tool -> hyprshot
bindd = $mainMod SHIFT, S, live screenshot, exec, hyprshot -m region -o /home/cj/Pictures/Screenshots

# Application launcher
$d=[$l|Rofi menus]
bindd = $mainMod, space, $d application finder , exec, pkill -x rofi || $scrPath/rofilaunch.sh
bindd = $mainMod Shift, t, $d theme switche , exec, pkill -x rofi || $scrPath/rofitheme.sh
#bindd = $mainMod, slash, $d keybindings hint, exec, pkill -x rofi || $scrPath/keybinds_hint.sh c # launch keybinds hint
#bindd = $mainMod, V, $d clipboard ,  exec, pkill -x rofi || $scrPath/cliphist.sh -c # launch clipboard,
#bindd = $mainMod Shift, V, $d clipboard manager , exec, pkill -x rofi || $scrPath/cliphist.sh # launch clipboard Manager
#delete? #bindd = $mainMod Shift, A, $d select rofi launcher , exec, pkill -x rofi || $scrPath/rofiselect.sh # launch select menu

# Media control
# (first two toggle between media play and pause)
binddl  = , XF86AudioPlay ,$d play media , exec, playerctl play-pause
binddl  = , XF86AudioPause,$d pause media, exec, playerctl play-pause
binddl  = , XF86AudioPrev ,$d play previous, exec, playerctl previous # media previous
binddl  = , XF86AudioNext ,$d play next, exec, playerctl next # media next
# Adjust Audio
bindel = , XF86AudioLowerVolume, exec, $scrPath/volumecontrol.sh -o d # decrease volume
bindel = , XF86AudioRaiseVolume, exec, $scrPath/volumecontrol.sh -o i # increase volume

###
### Boilerplate window movement, less interesting the lower you go
###

$wm=Window Management
$d=[$wm]
bindd = $mainMod, Q, $d close focused window, exec, $scrPath/dontkillsteam.sh # close focused window
bindd = Alt, F4, $d close focused window, exec, $scrPath/dontkillsteam.sh # close focused window
bindd = Shift, F11, $d toggle fullscreen, fullscreen
bindd = $mainMod, W, $d toggle floating window, togglefloating
bindd = $mainMod, S, $d toggle split, togglesplit
bindd = Control Alt, Delete, $d logout menu, exec, $scrPath/logoutlaunch.sh

# Move/Resize focused window
$d=[$wm|Move & Resize with mouse]
binddm = $mainMod, mouse:272, $d hold to move window, movewindow
binddm = $mainMod, mouse:273, $d hold to resize window, resizewindow

# Move/Change window focus
# Arrow Keys
bind = $mainMod, Left, swapwindow, l
bind = $mainMod, Right, swapwindow, r
bind = $mainMod, Up, swapwindow, u
bind = $mainMod, Down, swapwindow, d
# Vim keybinds
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r
# Alt tab 
# no alt tab x.x

# Switch workspaces
$ws=Workspaces
$d=[$ws|Navigation]
bindd = $mainMod, 1, $d navigate to workspace 1, workspace, 1
bindd = $mainMod, 2, $d navigate to workspace 2, workspace, 2
bindd = $mainMod, 3, $d navigate to workspace 3, workspace, 3
bindd = $mainMod, 4, $d navigate to workspace 4, workspace, 4
bindd = $mainMod, 5, $d navigate to workspace 5, workspace, 5
bindd = $mainMod, 6, $d navigate to workspace 6, workspace, 6
#bindd = $mainMod, 7, $d navigate to workspace 7, workspace, 7
#bindd = $mainMod, 8, $d navigate to workspace 8, workspace, 8
#bindd = $mainMod, 9, $d navigate to workspace 9, workspace, 9
#bindd = $mainMod, 0, $d navigate to workspace 10, workspace, 10

# Move focused window to a workspace
$d=[$ws|Move window to workspace]
bindd = $mainMod Shift, 1, $d move window to workspace 1 , movetoworkspace, 1
bindd = $mainMod Shift, 2, $d move window to workspace 2 , movetoworkspace, 2
bindd = $mainMod Shift, 3, $d move window to workspace 3 , movetoworkspace, 3
bindd = $mainMod Shift, 4, $d move window to workspace 4 , movetoworkspace, 4
bindd = $mainMod Shift, 5, $d move window to workspace 5 , movetoworkspace, 5
bindd = $mainMod Shift, 6, $d move window to workspace 6 , movetoworkspace, 6
#bindd = $mainMod Shift, 7, $d move window to workspace 7 , movetoworkspace, 7
#bindd = $mainMod Shift, 8, $d move window to workspace 8 , movetoworkspace, 8
#bindd = $mainMod Shift, 9, $d move window to workspace 9 , movetoworkspace, 9
#bindd = $mainMod Shift, 0, $d move window to workspace 10 , movetoworkspace, 10

$d=#! unset the group name
