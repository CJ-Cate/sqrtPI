
# в–Ҳв–‘в–Ҳв–‘в–ҲвҖғв–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–„вҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–Ҳв–‘в–ҲвҖғ вҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–ҲвҖғв–Ҳв–‘в–‘вҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җ
# в–Җв–„в–Җв–„в–ҖвҖғв–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–„в–ҖвҖғв–Ҳв–„в–ҲвҖғв–Җв–„в–Җв–„в–ҖвҖғ вҖғв–Ҳв–Җв–„вҖғв–Ҳв–„в–ҲвҖғв–Ҳв–„в–„вҖғв–Ҳв–Ҳв–„вҖғв–„в–Ҳ
# See https://wiki.hyprland.org/Configuring/Window-Rules/
# Conversion script to update from windowrulesv2: https://itsohen.github.io/hyprrulefix/

# '$&' is a hyde specific shorthand for "override" \\ analogous to a reference
# This symbol indicates that the following values will override the default configuration
$&=override

# idleinhibit rules
windowrule = idle_inhibit fullscreen, match:class ^(.*celluloid.*)$|^(.*mpv.*)$|^(.*vlc.*)$
windowrule = idle_inhibit fullscreen, match:class ^(.*[Ss]potify.*)$
windowrule = idle_inhibit fullscreen, match:class ^(.*LibreWolf.*)$|^(.*floorp.*)$|^(.*firefox.*)$

# Picture-in-Picture from HyDE
windowrule = float on, keep_aspect_ratio on, move ((monitor_w*0.73)) ((monitor_h*0.72)), size (monitor_w*0.25), pin on, match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
windowrule = float on, match:class ^(firefox)$, match:title ^(Picture-in-Picture)$

#windowrule = opacity 0.90 $& 0.90 $& 1, match:class ^(brave-browser)$
#windowrule = opacity 0.90 $& 0.90 $& 1,class:^(librewolf)$ # I dont want my browser transparent
windowrule = opacity 0.90 $& 0.90 $& 1, match:class ^(firefox)$
windowrule = opacity 1 $& 0.94 $& 1, match:class ^([Oo]bsidian)$
windowrule = opacity 0.92 $& 0.86 $& 1, match:class ^(code-oss)$
windowrule = opacity 0.92 $& 0.86 $& 1, match:class ^([Cc]ode)$
windowrule = opacity 0.92 $& 0.86 $& 1, match:class ^(code-url-handler)$
windowrule = opacity 0.92 $& 0.86 $& 1, match:class ^(code-insiders-url-handler)$
windowrule = opacity 0.95 $& 0.90 $& 1, match:class ^([Kk]itty)
windowrule = opacity 0.92 $& 0.86 $& 1, match:class ^(org.kde.dolphin)$
windowrule = opacity 0.92 $& 0.86 $& 1, float on, match:class ^(org.kde.ark)$
windowrule = opacity 0.92 $& 0.86 $& 1, float on, match:class ^(nwg-look)$
windowrule = opacity 0.92 $& 0.86 $& 1, float on, match:class ^(qt5ct)$
windowrule = opacity 0.92 $& 0.86 $& 1, float on, match:class ^(qt6ct)$
windowrule = opacity 0.92 $& 0.86 $& 1, float on, match:class ^(kvantummanager)$
windowrule = opacity 0.92 $& 0.86 $& 1, float on, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = opacity 0.92 $& 0.86 $& 1, float on, match:class ^(blueman-manager)$
windowrule = opacity 0.92 $& 0.86 $& 1, float on, match:class ^(nm-applet)$
windowrule = opacity 0.92 $& 0.86 $& 1, float on, match:class ^(nm-connection-editor)$
windowrule = opacity 0.92 $& 0.86 $& 1, float on, match:class ^(org.kde.polkit-kde-authentication-agent-1)$
windowrule = opacity 0.92 $& 0.86 $& 1, match:class ^(polkit-gnome-authentication-agent-1)$
windowrule = opacity 0.92 $& 0.86 $& 1, match:class ^(org.freedesktop.impl.portal.desktop.gtk)$
windowrule = opacity 0.92 $& 0.86 $& 1, match:class ^(org.freedesktop.impl.portal.desktop.hyprland)$
windowrule = opacity 0.92 $& 0.86 $& 1, float off, match:class ^([Ss]team)$
windowrule = opacity 0.92 $& 0.86 $& 1, match:class ^(steamwebhelper)$
windowrule = opacity 0.92 $& 0.86 $& 1, match:class ^([Ss]potify)$ # if not work try append "free" or "premium"
windowrule = opacity 0.95 0.90, match:class ^(vesktop)$ # Vesktop

windowrule = opacity 1 0.50, match:class ^(discord)$ # Discord-Electron, personal reminder not to use

# common modals
windowrule = float on, match:title ^(Open)$
windowrule = float on, match:title ^(Authentication Required)$
windowrule = float on, match:title ^(Add Folder to Workspace)$
#windowrule = float,initialtitle:^(Open File)$ #this broke for some reason
windowrule = float on, match:title ^(Choose Files)$
windowrule = float on, match:title ^(Save As)$
windowrule = float on, match:title ^(Confirm to replace files)$
windowrule = float on, match:title ^(File Operation Progress)$
windowrule = float on, match:class ^([Xx]dg-desktop-portal-gtk)$
windowrule = float on, match:title ^(File Upload)(.*)$
windowrule = float on, match:title ^(Choose wallpaper)(.*)$
windowrule = float on, match:title ^(Library)(.*)$
windowrule = float on, match:class ^(.*dialog.*)$
windowrule = float on, match:title ^(.*dialog.*)$

# GTK Apps (personally vetted)
windowrule = opacity 0.80 0.80, match:class ^(com.obsproject.Studio)$ # obs
windowrule = opacity 0.80 0.80, match:class ^(io.missioncenter.MissionCenter)$ # MissionCenter-Gtk
#windowrule = opacity 0.80 0.80, float on, match:class ^(Signal)$ # Signal-Gtk #not installed rn

# GTK Apps (need to sort)
windowrule = opacity 0.90 0.90, float on, match:class ^(com.github.rafostar.Clapper)$ # Clapper-Gtk
windowrule = opacity 0.80 0.80, match:class ^(com.github.tchx84.Flatseal)$ # Flatseal-Gtk
windowrule = opacity 0.80 0.80, float on, match:class ^(yad)$ # Protontricks-Gtk
windowrule = opacity 0.80 0.80, float on, match:class ^(io.github.alainm23.planify)$ # planify-Gtk
windowrule = opacity 0.80 0.80, float on, match:class ^(io.gitlab.theevilskeleton.Upscaler)$ # Upscaler-Gtk
windowrule = opacity 0.80 0.80, match:class ^(com.github.unrud.VideoDownloader)$ # VideoDownloader-Gtk
windowrule = opacity 0.80 0.80, float on, match:class ^(io.gitlab.adhami3310.Impression)$ # Impression-Gtk
windowrule = opacity 0.80 0.80, match:class ^(io.github.flattool.Warehouse)$ # Warehouse-Gtk

windowrule = float on, match:class ^(eog)$ # Imageviewer-Gtk
windowrule = float on, match:class ^(com.github.unrud.VideoDownloader)$ # VideoDownloader-Gkk

# Default float stuff
windowrule = float on, match:title ^(About Mozilla Firefox)$
windowrule = float on, match:class ^(firefox)$, match:title ^(Library)$
windowrule = float on, match:class ^(kitty)$, match:title ^(top)$
windowrule = float on, match:class ^(kitty)$, match:title ^(btop)$
windowrule = float on, match:class ^(kitty)$, match:title ^(htop)$
windowrule = float on, match:class ^(vlc)$

# workaround for jetbrains IDEs dropdowns/popups cause flickering
windowrule = no_initial_focus on, match:class ^(.*jetbrains.*)$, match:title ^(win[0-9]+)$

# в–Ҳв–‘в–‘вҖғв–„в–Җв–ҲвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–ҲвҖғ вҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–ҲвҖғв–Ҳв–‘в–‘вҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җ
# в–Ҳв–„в–„вҖғв–Ҳв–Җв–ҲвҖғв–‘в–Ҳв–‘вҖғв–Ҳв–Ҳв–„вҖғв–Ҳв–Җв–„вҖғ вҖғв–Ҳв–Җв–„вҖғв–Ҳв–„в–ҲвҖғв–Ҳв–„в–„вҖғв–Ҳв–Ҳв–„вҖғв–„в–Ҳ
layerrule = blur on, ignore_alpha 0, match:namespace rofi
layerrule = blur on, ignore_alpha 0, match:namespace notifications
#layerrule = blur on, ignore_alpha 0, match:namespace swaync-notification-window
#layerrule = blur on, ignore_alpha 0, match:namespace swaync-control-center
layerrule = blur on, match:namespace logout_dialog

