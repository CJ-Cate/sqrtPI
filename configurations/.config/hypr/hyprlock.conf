# Background

source = ./sq-hyprlock.conf

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    color = rgba(216, 222, 233, 0.90)
    font_size = 120
    font_family = SF Pro Display Bold
    position = 0, 230
    halign = center
    valign = center
}

# Password Field
input-field {
    monitor =
    size = 480, 55
    outline_thickness = 2
    dots_size = 0.4                 # Password dot size (0.2-0.8)
    dots_spacing = 0.3              # Spacing between dots (0.0-1.0)
    dots_center = true              # Center dots in field
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = SF Pro Display Bold
    placeholder_text = <i><span foreground="##ffffff99">Password, please.</span></i>
    hide_input = true              # Show/hide password dots
    position = 0, -210
    halign = center
    valign = center
}
